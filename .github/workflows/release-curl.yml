name: Release Curl Assets

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curl-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate install/uninstall scripts
        run: |
          mkdir -p release-assets

          cat > release-assets/install.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          SOURCE="__SEDE_DEFAULT_SOURCE__"

          while [[ $# -gt 0 ]]; do
            case "$1" in
              -s|--source)
                SOURCE="$2"
                shift 2
                ;;
              *)
                echo "Unknown argument: $1" >&2
                exit 1
                ;;
            esac
          done

          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          elif command -v python >/dev/null 2>&1; then
            PYTHON_BIN="python"
          else
            echo "Python is required but was not found. Install Python 3.9+ first." >&2
            exit 1
          fi

          INSTALL_ROOT="${HOME}/.local/share/sede"
          VENV_DIR="${INSTALL_ROOT}/venv"
          BIN_DIR="${HOME}/.local/bin"
          LAUNCHER_PATH="${BIN_DIR}/sede"
          REPO_URL="https://github.com/ilypopv/sede.git"

          if [[ "$SOURCE" == "latest" ]]; then
            PACKAGE_SPEC="git+${REPO_URL}@main"
          else
            PACKAGE_SPEC="git+${REPO_URL}@${SOURCE}"
          fi

          echo "Installing sede (${SOURCE})..."
          mkdir -p "$INSTALL_ROOT" "$BIN_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          "$VENV_DIR/bin/python" -m pip install --upgrade pip >/dev/null
          "$VENV_DIR/bin/pip" install "$PACKAGE_SPEC"

          cat > "$LAUNCHER_PATH" <<'EOS'
          #!/usr/bin/env bash
          set -euo pipefail
          exec "$HOME/.local/share/sede/venv/bin/python" -m sede "$@"
          EOS
          chmod +x "$LAUNCHER_PATH"

          echo
          echo "sede was installed successfully."
          echo "Binary: $LAUNCHER_PATH"
          if [[ ":$PATH:" != *":$BIN_DIR:"* ]]; then
            echo "Add this to your shell profile if needed:"
            echo "  export PATH=\"$BIN_DIR:\$PATH\""
          fi
          EOF

          cat > release-assets/uninstall.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          INSTALL_ROOT="${HOME}/.local/share/sede"
          BIN_PATH="${HOME}/.local/bin/sede"
          CONFIG_DIR="${HOME}/.config/sede"
          CACHE_DIR="${HOME}/.cache/sede"
          STATE_DIR="${HOME}/.local/state/sede"

          rm -f "$BIN_PATH"
          rm -rf "$INSTALL_ROOT"
          rm -rf "$CONFIG_DIR" "$CACHE_DIR" "$STATE_DIR"

          echo "sede has been removed from this user profile."
          echo "Note: assistant session data in ~/.claude and ~/.copilot was not modified."
          EOF

          cat > release-assets/install.ps1 <<'EOF'
          param(
              [string]$Source = "__SEDE_DEFAULT_SOURCE__"
          )

          $ErrorActionPreference = "Stop"

          $pythonCommand = $null
          if (Get-Command py -ErrorAction SilentlyContinue) {
              $pythonCommand = @("py", "-3")
          } elseif (Get-Command python -ErrorAction SilentlyContinue) {
              $pythonCommand = @("python")
          } else {
              throw "Python 3.9+ is required but was not found."
          }

          $installRoot = Join-Path $env:LOCALAPPDATA "sede"
          $venvDir = Join-Path $installRoot "venv"
          $binDir = Join-Path $installRoot "bin"
          $launcherPath = Join-Path $binDir "sede.cmd"
          $repoUrl = "https://github.com/ilypopv/sede.git"

          if ($Source -eq "latest") {
              $packageSpec = "git+$repoUrl@main"
          } else {
              $packageSpec = "git+$repoUrl@$Source"
          }

          Write-Host "Installing sede ($Source)..."
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          if ($pythonCommand.Length -eq 2) {
              & $pythonCommand[0] $pythonCommand[1] -m venv $venvDir
          } else {
              & $pythonCommand[0] -m venv $venvDir
          }
          & "$venvDir\Scripts\python.exe" -m pip install --upgrade pip | Out-Null
          & "$venvDir\Scripts\pip.exe" install $packageSpec

          $launcherContent = "@echo off`r`n\"%~dp0..\venv\Scripts\python.exe\" -m sede %*`r`n"
          Set-Content -Path $launcherPath -Value $launcherContent -Encoding ASCII

          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          if (-not $userPath) {
              $userPath = ""
          }

          if (-not (($userPath -split ';') -contains $binDir)) {
              $newPath = ($userPath.TrimEnd(';') + ";$binDir").TrimStart(';')
              [Environment]::SetEnvironmentVariable("Path", $newPath, "User")
              Write-Host "Added $binDir to User PATH. Restart terminal to apply."
          }

          Write-Host "sede installed successfully."
          Write-Host "Binary: $launcherPath"
          EOF

          cat > release-assets/uninstall.ps1 <<'EOF'
          $ErrorActionPreference = "Stop"

          $installRoot = Join-Path $env:LOCALAPPDATA "sede"
          $configDir = Join-Path $env:APPDATA "sede"

          if (Test-Path $installRoot) {
              Remove-Item -Recurse -Force $installRoot
          }

          if (Test-Path $configDir) {
              Remove-Item -Recurse -Force $configDir
          }

          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          if ($userPath) {
              $parts = $userPath -split ';' | Where-Object { $_ -and ($_ -ne (Join-Path $installRoot "bin")) }
              [Environment]::SetEnvironmentVariable("Path", ($parts -join ';'), "User")
          }

          Write-Host "sede has been removed from this user profile."
          Write-Host "Note: assistant session data in ~/.claude and ~/.copilot was not modified."
          EOF

          sed -i "s/__SEDE_DEFAULT_SOURCE__/${{ steps.meta.outputs.tag }}/g" release-assets/install.sh
          sed -i "s/__SEDE_DEFAULT_SOURCE__/${{ steps.meta.outputs.tag }}/g" release-assets/install.ps1

          chmod +x release-assets/install.sh release-assets/uninstall.sh
          (cd release-assets && sha256sum install.sh uninstall.sh install.ps1 uninstall.ps1 > checksums.txt)

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/install.sh
            release-assets/uninstall.sh
            release-assets/install.ps1
            release-assets/uninstall.ps1
            release-assets/checksums.txt

      - name: Upload workflow-dispatch artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sede-curl-assets
          path: release-assets
